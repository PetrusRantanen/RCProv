#####
# RCProvisioning - DNSMASQ config
#####

# Bind interfaces
bind-interfaces
no-resolv

# Listen only on eth1 (Provision LAN)
interface=eth1

# Don't listen on the eth0 (Uplink LAN)
except-interface=eth0

# No DNS
port=0

# DHCP range and given for 12-hour leases
dhcp-range=172.20.0.2,172.20.0.250,12h

# Set gateway and DNS to this Pi's eth1 address
dhcp-option=3,172.20.0.1
dhcp-option=6,172.20.0.1

# Log DHCP leases to file
dhcp-leasefile=/var/www/rcprovision/etc/dnsmasq.leases

# TFTP
enable-tftp
tftp-root=/var/www/rcprovision/scriptexecute

# Disable PING
no-ping

# PXE Service
pxe-service=0,"Raspberry Pi Boot"